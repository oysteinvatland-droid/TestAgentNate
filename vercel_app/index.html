<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hoopit">
  <title>Hoopit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #f0f0f0;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 24px);
      padding-top: max(env(safe-area-inset-top), 24px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    h1 span { color: #4ade80; }

    #refresh-btn {
      background: #1e1e28;
      border: none;
      color: #aaa;
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #refresh-btn:active { background: #2a2a38; }

    .card {
      background: #1a1a24;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
      border-left: 4px solid #4ade80;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #aaa;
    }

    .meta-row .icon { font-size: 15px; width: 18px; text-align: center; }
    .meta-row .value { color: #ddd; }

    .badge {
      display: inline-block;
      background: #2a2a3a;
      color: #aaa;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .day-label {
      font-size: 13px;
      font-weight: 600;
      color: #4ade80;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      margin-top: 4px;
    }

    #status {
      text-align: center;
      color: #555;
      font-size: 13px;
      margin-top: 28px;
      padding-bottom: 8px;
    }

    .loading {
      text-align: center;
      color: #555;
      padding: 60px 0;
      font-size: 16px;
    }

    .spinning { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #2a1a1a;
      border-left: 4px solid #f87171;
      border-radius: 12px;
      padding: 16px;
      color: #f87171;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚽ <span>Hoopit</span></h1>
    <button id="refresh-btn" onclick="load()" title="Oppdater">↻</button>
  </header>

  <div id="content"><div class="loading"><span class="spinning">↻</span> Laster...</div></div>

  <div id="status"></div>

  <script>
    const SUPABASE_URL = "https://bpnjioorcjqvntxkpuia.supabase.co";
    const ANON_KEY     = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwbmppb29yY2pxdm50eGtwdWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjMyODMsImV4cCI6MjA4OTY5OTI4M30.Wc3ZUXK1xIB_9_kCPyEesmCM7mjLLTOZYgAv2yqro04";

    const DAY_NO = ["søndag","mandag","tirsdag","onsdag","torsdag","fredag","lørdag"];
    const MON_NO = ["jan","feb","mar","apr","mai","jun","jul","aug","sep","okt","nov","des"];

    function fmt(dtStr) {
      if (!dtStr) return { date: "–", time: "" };
      const d = new Date(dtStr);
      const day  = DAY_NO[d.getDay()];
      const date = `${day.charAt(0).toUpperCase() + day.slice(1)} ${d.getDate()}. ${MON_NO[d.getMonth()]}`;
      const time = d.toLocaleTimeString("no", { hour: "2-digit", minute: "2-digit" });
      return { date, time };
    }

    function fmtTime(dtStr) {
      if (!dtStr) return "";
      return new Date(dtStr).toLocaleTimeString("no", { hour: "2-digit", minute: "2-digit" });
    }

    async function load() {
      const btn = document.getElementById("refresh-btn");
      btn.classList.add("spinning");

      try {
        const now = new Date().toISOString();
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/hoopit_appointments?datetime=gte.${now}&order=datetime.asc&limit=2`,
          { headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` } }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const events = await res.json();

        const content = document.getElementById("content");
        if (!events.length) {
          content.innerHTML = '<div class="loading">Ingen kommende treninger 🎉</div>';
        } else {
          content.innerHTML = events.map(e => {
            const { date, time } = fmt(e.datetime);
            const endTime = fmtTime(e.end_time);
            const timeStr = endTime ? `${time}–${endTime}` : time;
            return `
              <div class="day-label">${date}</div>
              <div class="card">
                ${e.group_name ? `<div class="badge">${e.group_name}</div>` : ""}
                <div class="card-title">${e.title}</div>
                <div class="card-meta">
                  ${timeStr ? `<div class="meta-row"><span class="icon">🕐</span><span class="value">${timeStr}</span></div>` : ""}
                  ${e.location ? `<div class="meta-row"><span class="icon">📍</span><span class="value">${e.location}</span></div>` : ""}
                </div>
              </div>`;
          }).join("");
        }

        const latest = await fetch(
          `${SUPABASE_URL}/rest/v1/hoopit_appointments?order=updated_at.desc&limit=1`,
          { headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` } }
        );
        const [last] = await latest.json();
        if (last) {
          const upd = new Date(last.updated_at).toLocaleString("no", {
            day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit"
          });
          document.getElementById("status").textContent = `Oppdatert ${upd}`;
        }
      } catch (err) {
        document.getElementById("content").innerHTML =
          `<div class="error-msg">Kunne ikke laste data: ${err.message}</div>`;
      } finally {
        btn.classList.remove("spinning");
      }
    }

    load();
  </script>
</body>
</html>

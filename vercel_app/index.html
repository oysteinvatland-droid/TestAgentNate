<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Treninger">
  <title>Treninger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #f0f0f0;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 24px);
      padding-top: max(env(safe-area-inset-top), 24px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }

    #refresh-btn {
      background: #1e1e28;
      border: none;
      color: #aaa;
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #refresh-btn:active { background: #2a2a38; }

    .section { margin-bottom: 28px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-hoopit { background: #4ade80; }
    .dot-spond  { background: #60a5fa; }

    .card {
      background: #1a1a24;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 10px;
    }
    .card-hoopit { border-left: 4px solid #4ade80; }
    .card-spond  { border-left: 4px solid #60a5fa; }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .badge {
      display: inline-block;
      background: #2a2a3a;
      color: #999;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .day-label {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #bbb;
      margin-top: 4px;
    }
    .meta-row .icon { font-size: 13px; width: 16px; text-align: center; }

    #status {
      text-align: center;
      color: #444;
      font-size: 12px;
      margin-top: 8px;
      padding-bottom: 8px;
    }

    .loading {
      text-align: center;
      color: #555;
      padding: 40px 0;
      font-size: 15px;
    }

    .spinning { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { color: #555; font-size: 14px; padding: 12px 0; }
  </style>
</head>
<body>
  <header>
    <h1>🏃 Treninger</h1>
    <button id="refresh-btn" onclick="load()" title="Oppdater">↻</button>
  </header>

  <div id="content"><div class="loading"><span class="spinning">↻</span></div></div>
  <div id="status"></div>

  <script>
    const SB_URL  = "https://bpnjioorcjqvntxkpuia.supabase.co";
    const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwbmppb29yY2pxdm50eGtwdWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjMyODMsImV4cCI6MjA4OTY5OTI4M30.Wc3ZUXK1xIB_9_kCPyEesmCM7mjLLTOZYgAv2yqro04";

    const DAY = ["søn","man","tir","ons","tor","fre","lør"];
    const MON = ["jan","feb","mar","apr","mai","jun","jul","aug","sep","okt","nov","des"];

    function fmtDate(ts) {
      if (!ts) return "–";
      const d = new Date(ts);
      return `${DAY[d.getDay()]} ${d.getDate()}. ${MON[d.getMonth()]}`;
    }

    function fmtTime(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleTimeString("no", { hour: "2-digit", minute: "2-digit" });
    }

    function renderCards(events, cls) {
      if (!events.length) return `<div class="empty">Ingen kommende</div>`;
      return events.map(e => {
        const date = fmtDate(e.datetime);
        const t1   = fmtTime(e.datetime);
        const t2   = fmtTime(e.end_time);
        const time = t2 ? `${t1}–${t2}` : t1;
        return `
          <div class="day-label">${date}</div>
          <div class="card ${cls}">
            ${e.group_name ? `<div class="badge">${e.group_name}</div>` : ""}
            <div class="card-title">${e.title}</div>
            ${time     ? `<div class="meta-row"><span class="icon">🕐</span>${time}</div>` : ""}
            ${e.location ? `<div class="meta-row"><span class="icon">📍</span>${e.location}</div>` : ""}
          </div>`;
      }).join("");
    }

    async function sbFetch(table) {
      const now = new Date().toISOString();
      const r = await fetch(
        `${SB_URL}/rest/v1/${table}?datetime=gte.${now}&order=datetime.asc&limit=2`,
        { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }
      );
      if (!r.ok) throw new Error(`${table} HTTP ${r.status}`);
      return r.json();
    }

    async function load() {
      const btn = document.getElementById("refresh-btn");
      btn.classList.add("spinning");

      try {
        const [hoopit, spond] = await Promise.all([
          sbFetch("hoopit_appointments"),
          sbFetch("spond_appointments"),
        ]);

        document.getElementById("content").innerHTML = `
          <div class="section">
            <div class="section-header">
              <div class="dot dot-hoopit"></div>
              <div class="section-title">Hoopit</div>
            </div>
            ${renderCards(hoopit, "card-hoopit")}
          </div>
          <div class="section">
            <div class="section-header">
              <div class="dot dot-spond"></div>
              <div class="section-title">Spond</div>
            </div>
            ${renderCards(spond, "card-spond")}
          </div>`;

        // Last updated
        const all = [...hoopit, ...spond].sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
        if (all[0]) {
          const upd = new Date(all[0].updated_at).toLocaleString("no", {
            day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit"
          });
          document.getElementById("status").textContent = `Oppdatert ${upd}`;
        }
      } catch (err) {
        document.getElementById("content").innerHTML =
          `<div class="loading" style="color:#f87171">Feil: ${err.message}</div>`;
      } finally {
        btn.classList.remove("spinning");
      }
    }

    load();
  </script>
</body>
</html>
